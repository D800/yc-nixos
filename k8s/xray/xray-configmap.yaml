apiVersion: v1
kind: ConfigMap
metadata:
  name: xray-config
  namespace: proxy-stack
data:
  config.json: |
    {
      "log": {
        "loglevel": "warning",
        "access": "/tmp/xray-access.log",
        "error": "/tmp/xray-error.log"
      },
      "dns": {
        "servers": [
          {
            "address": "77.88.8.8",
            "port": 53,
            "domains": [
              "geosite:category-ru",
              "regexp:\\.ru$",
              "regexp:\\.su$",
              "regexp:\\.xn--p1ai$"
            ],
            "expectIPs": ["geoip:ru"]
          },
          {
            "address": "1.1.1.1",
            "port": 53
          }
        ]
      },
      "inbounds": [
        {
          "tag": "tproxy-in",
          "port": 12345,
          "protocol": "dokodemo-door",
          "settings": {
            "network": "tcp,udp",
            "followRedirect": true
          },
          "streamSettings": {
            "sockopt": {
              "tproxy": "tproxy",
              "mark": 255
            }
          },
          "sniffing": {
            "enabled": true,
            "destOverride": ["http", "tls", "quic"],
            "routeOnly": false
          }
        },
        {
          "tag": "socks-in",
          "port": 10808,
          "listen": "127.0.0.1",
          "protocol": "socks",
          "settings": {
            "auth": "noauth",
            "udp": true
          },
          "sniffing": {
            "enabled": true,
            "destOverride": ["http", "tls", "quic"],
            "routeOnly": false
          }
        }
      ],
      "outbounds": [
        {
          "tag": "vless-reality",
          "protocol": "vless",
          "settings": {
            "vnext": [
              {
                "address": "UPSTREAM_ADDRESS",
                "port": 443,
                "users": [
                  {
                    "id": "UPSTREAM_UUID",
                    "encryption": "none",
                    "flow": "xtls-rprx-vision"
                  }
                ]
              }
            ]
          },
          "streamSettings": {
            "network": "tcp",
            "security": "reality",
            "realitySettings": {
              "fingerprint": "chrome",
              "serverName": "UPSTREAM_SNI",
              "publicKey": "UPSTREAM_PUBLIC_KEY",
              "shortId": "UPSTREAM_SHORT_ID"
            },
            "sockopt": {
              "mark": 255
            }
          }
        },
        {
          "tag": "direct",
          "protocol": "freedom",
          "settings": {},
          "streamSettings": {
            "sockopt": {
              "mark": 255
            }
          }
        },
        {
          "tag": "block",
          "protocol": "blackhole",
          "settings": {
            "response": {
              "type": "http"
            }
          }
        }
      ],
      "routing": {
        "domainStrategy": "IPIfNonMatch",
        "rules": [
          {
            "type": "field",
            "outboundTag": "direct",
            "domain": [
              "geosite:category-ru"
            ]
          },
          {
            "type": "field",
            "outboundTag": "direct",
            "ip": [
              "geoip:ru",
              "geoip:private"
            ]
          },
          {
            "type": "field",
            "outboundTag": "direct",
            "domain": [
              "regexp:\\.ru$",
              "regexp:\\.su$",
              "regexp:\\.xn--p1ai$"
            ]
          },
          {
            "type": "field",
            "outboundTag": "block",
            "domain": [
              "geosite:category-ads-all"
            ]
          },
          {
            "type": "field",
            "outboundTag": "vless-reality",
            "port": "0-65535"
          }
        ]
      }
    }
