apiVersion: apps/v1
kind: Deployment
metadata:
  name: amneziawg
  namespace: proxy-stack
  labels:
    app: amneziawg
spec:
  replicas: 1
  selector:
    matchLabels:
      app: amneziawg
  template:
    metadata:
      labels:
        app: amneziawg
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      initContainers:
        - name: init-network
          image: busybox:1.36
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
                - NET_RAW
            privileged: true
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "Setting up network for AmneziaWG TPROXY..."

              # ip rule для маршрутизации трафика awg0 через TPROXY
              ip rule add from 10.10.0.0/24 table 100 2>/dev/null || true
              ip route add local 0.0.0.0/0 dev lo table 100 2>/dev/null || true

              echo "Network setup complete"
      containers:
        - name: amneziawg
          image: lscr.io/linuxserver/wireguard:latest
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
                - NET_RAW
            privileged: true
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
          ports:
            - containerPort: 51820
              protocol: UDP
              name: wireguard
          volumeMounts:
            - name: awg-config
              mountPath: /config/wg_confs
            - name: awg-secrets
              mountPath: /run/secrets/amneziawg
              readOnly: true
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "ip link show awg0 2>/dev/null || ip link show wg0 2>/dev/null"
            initialDelaySeconds: 15
            periodSeconds: 30
      volumes:
        - name: awg-config
          configMap:
            name: amneziawg-config
        - name: awg-secrets
          hostPath:
            path: /run/agenix/amneziawg-private
            type: FileOrCreate
